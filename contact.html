        <title> Home Page </title>
        <!--Link stylesheet here-->
        <link rel="stylesheet" href="styles/stylesheet.css">
        <style>
            label{
                float: left;
                width: 112px;
                padding-right: 10px;
                text-align: right;
            }
            input{
                margin-left: 1em;
                margin-bottom: .5em;
                width: 220px;
            }
            #button, #reset{
                margin-top: .5em;
                width: 8em;
                background-color: red;
                color: white;
                border: solid 2px black;
                border-radius: 5px;
                height: 2em;
            }
            input[type="checkbox"] {width: 15px;}
            #button {margin-left: 138px;}
            #reset {margin-left: 52px;}
            input[type="radio"] {width: 10px;}
            .required {
                font-weight: bold;
                color: red;
            }
        </style>
    </head>
    <body>
        <header>
            <img style="width: 100px; float: left;" src="images/logo.jpeg" alt="logo">
            <h1> Sligo Fitness</h1>
            <nav class="clearfix">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="programs.html">Programs</a></li>
                    <li><a href="trainers.html">Trainers</a></li>
                    <li><a href="membership.html">Membership</a></li>
                    <li><a id="active" href="contact.html">Contact</a></li>
                </ul>
            </nav>
            <section class="project_disclaimer">

            </section>
        </header>
        <main >
            <section>
                <h3>Please fill out the form and we will contact you shortly:</h3>
                <form action="https:/foo.com" method="put">
                    <label for="first-name">First name:<span class="required">*</span></label>
                    <input type="text" name="first-name" id="first-name" placeholder="John" autofocus required><br>

                    <label for="last-name">Last name:<span class="required">*</span></label>
                    <input type="text" name="last-name" id="last-name" placeholder="Doe" autofocus required><br>

                    <label for="email">Email:<span class="required">*</span></label>
                    <input type="email" name="email" id="email" required placeholder="johndoe@example.com"><br>

                    <label for="message">Query : </label>
                    <textarea cols="40"rows="6" id="message" placeholder="Enter your message here."></textarea><br>

                    <input type="submit" name="submit" id="button" value="Submit">
                    <input type="reset" name="reset" id="reset">
                </form>
                <p style="margin-left: 138px;"> <span class="required">*</span> <em> indicates a required field.</em></p>
            </section>
        </main>
        
        <footer class="clearfix">
